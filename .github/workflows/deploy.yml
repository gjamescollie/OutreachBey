name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /root/cay-cay-ai-client1
            git pull origin main
            docker compose build --no-cache
            docker compose up -d
            tailscale serve --bg http://localhost:3000 || true
            echo "✅ Deploy complete — dashboard: http://$(tailscale ip -4):3000"
