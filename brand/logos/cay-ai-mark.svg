<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Cay AI product mark — stylized wave/cay icon -->
  <!-- Outer circle -->
  <circle cx="40" cy="40" r="38" fill="#0F6E56"/>

  <!-- Wave shape representing a cay (small island/sandbar) -->
  <!-- Water waves -->
  <path
    d="M 12 46 Q 22 40 32 46 Q 42 52 52 46 Q 62 40 68 46"
    fill="none"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
    opacity="0.6"/>
  <path
    d="M 12 52 Q 22 46 32 52 Q 42 58 52 52 Q 62 46 68 52"
    fill="none"
    stroke="white"
    stroke-width="2.5"
    stroke-linecap="round"
