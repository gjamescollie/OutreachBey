  <!-- Island silhouette -->
  <ellipse cx="40" cy="44" rx="18" ry="7" fill="white" opacity="0.15"/>
  <ellipse cx="40" cy="43" rx="14" ry="5" fill="white" opacity="0.2"/>

  <!-- "C" letterform — bold, white -->
  <path
    d="M 52 32 Q 40 18 28 26 Q 18 33 18 40 Q 18 50 28 55 Q 40 61 52 49"
    fill="none"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"/>

